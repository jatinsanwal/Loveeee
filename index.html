<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  background: linear-gradient(135deg, #ff6fa5, #ffb6c1);
  overflow: hidden;
  color: white;
}

.page {
  height: 100vh;
  width: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 25px;
  flex-direction: column;
}

.active {
  display: flex;
  animation: fade 0.8s ease;
}

@keyframes fade {
  from {opacity: 0;}
  to {opacity: 1;}
}

h1 {
  font-size: 34px;
  margin-bottom: 15px;
}

h2 {
  font-size: 40px;
  margin-top: 20px;
}

p {
  font-size: 22px;
  max-width: 600px;
  line-height: 1.8;
  min-height: 150px;
}

button {
  margin-top: 25px;
  padding: 14px 28px;
  border: none;
  border-radius: 30px;
  background: white;
  color: #ff4d88;
  font-weight: bold;
  cursor: pointer;
  font-size: 18px;
}

/* CHITS */
.chits {
  display: flex;
  gap: 20px;
  margin-top: 30px;
}

.chit {
  width: 90px;
  height: 90px;
  background: white;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  transition: 0.6s;
  transform-style: preserve-3d;
}

/* folded look */
.chit::before {
  content: "💌";
  position: absolute;
  font-size: 32px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* flip animation */
.chit.open {
  transform: rotateY(180deg) scale(1.1);
  background: #fff0f5;
}

.chit.open::before {
  content: "";
}

.chit.open::after {
  content: attr(data-value);
  position: absolute;
  font-size: 22px;
  color: #ff4d88;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotateY(180deg);
}

/* typing cursor */
.cursor {
  display: inline-block;
  width: 2px;
  background: white;
  margin-left: 4px;
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,50%,100% {opacity: 1;}
  25%,75% {opacity: 0;}
}

</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active" id="p1">
  <h1>Hey ❤️</h1>
  <p id="text1"></p>
  <button onclick="nextPage('p2')">Start 💖</button>
</div>

<!-- GAME -->
<div class="page" id="p2">
  <h1>Pick one 💌</h1>
  <p id="text2"></p>

  <div class="chits">
    <div class="chit" data-value="85% 💖" onclick="pick(this)"></div>
    <div class="chit" data-value="87% 💖" onclick="pick(this)"></div>
    <div class="chit" data-value="90% 💖" onclick="pick(this)"></div>
    <div class="chit" data-value="89% 💖" onclick="pick(this)"></div>
  </div>
</div>

<!-- RESULT -->
<div class="page" id="p3">
  <h1>🎉 Hurrayyy 🎉</h1>
  <h2 id="result"></h2>
  <p id="text3"></p>
  <button onclick="nextPage('p4')">Next ❤️</button>
</div>

<!-- FINAL -->
<div class="page" id="p4">
  <h1>Listen ❤️</h1>
  <p id="text4"></p>
  <h2>Take care my strong girl 💖</h2>
</div>

<script>

// typing effect
function typeText(id, text, speed=35) {
  let i = 0;
  let el = document.getElementById(id);
  el.innerHTML = "";
  function typing() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, speed);
    } else {
      el.innerHTML += '<span class="cursor"></span>';
    }
  }
  typing();
}

// messages
typeText("text1",
`Mujhe pata hai aajkal tum thoda stress feel kar rahi ho... 😔

Result ka pressure, periods ka pain… sab ek sath aana easy nahi hota 💔

But ek baat yaad rakhna — Tum already bohot strong ho 💖

Aur main… hamesha tumhare saath hoon 🤍

And I am always proud of you ❤️`
);

typeText("text2",
`Jo tum choose karogi… wahi tumhari destiny 😉💖`
);

// navigation
function nextPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="p3"){
    typeText("text3",
`Dekhaaa 😍 itni acchi percentage 💖

Par sach bataun… Ye sab sirf ek game hai 💭

Real life me sabse important hoti hai tumhari mehnat 💪✨`
);
  }

  if(id==="p4"){
    typeText("text4",
`Marks kabhi bhi tumhari value define nahi karte 💯

Jo tum ho… woh already enough hai 💖

Bas ab thoda focus aage ke paper pe lagate hain 💪📚
SSC ho ya koi bhi exam… tum kar logi 🤍

Aur jab bhi tumhe lage ki tum thak gayi ho…
ya demotivated feel ho rahi ho… 😔

Bas mere paas aajana 💌
Mujhse baat kar lena… sab share kar lena 💞

Main hamesha tumhare saath hoon… aaj, kal… aur hamesha ❤️

And I am always proud of you 💖`
);
  }
}

// chit pick
function pick(el){
  let value = el.getAttribute("data-value");
  el.classList.add("open");

  setTimeout(()=>{
    nextPage("p3");
    document.getElementById("result").innerText = value;
  },1200);
}

</script>

</body>
</html>
